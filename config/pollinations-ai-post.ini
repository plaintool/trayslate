[Service]
Order=15
AutoSwapLanguage=1
ValueType=Language
Name=Pollinations AI - Post

[Request]
Method=POST
EncryptText=1
UserAgent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/145.0.0.0 Safari/537.36
EncodeText=0
Url=https://text.pollinations.ai/openai
ContentType=application/json
PostData={\r\n    "model": "openai",\r\n    "messages": [\r\n      {"role": "user", "content": "{prompt}"}\r\n    ]\r\n}
Accept=*/*

[Parameters]
EncodeCustomParameters=0

[Response]
JsonPointer=/choices/0/message/content

[Headers]
Connection=keep-alive

[Custom Parameters]
prompt=Translate from {source} language to {target} language. Return only the translated text. Preserve line breaks and word wrapping in the output. Text for translation: {text}

