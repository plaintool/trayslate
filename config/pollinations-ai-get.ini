[Service]
Name=Pollinations AI - Get
Order=5
AutoSwapLanguage=1
ValueType=Language
ColorRecent=3329330


[Service Description]
0=Pollinations AI – Get — this configuration sends a GET request to Pollinations AI text endpoint, passing the full prompt directly in the URL. It uses the same idea as the POST version, instructing the AI model to translate text from the source language to the target language while preserving formatting such as line breaks and word wrapping. The response is returned as plain generated text.
1=
2=Legal note: Pollinations AI provides public endpoints for free access, mainly intended for testing, experimentation, and low-frequency personal use. This GET-based endpoint is a simplified interface and may have additional limitations (such as URL length limits or encoding issues). For normal interactive use (manual translation requests), this configuration is generally acceptable.
3=
4=These services are community-driven and do not guarantee stability, availability, or consistent behavior. The underlying models and behavior may change at any time without notice.
5=
6=The user is responsible for how this configuration is used. High-volume, automated, or commercial usage may be restricted or unreliable. If you need a stable, production-ready, or commercial solution, it is recommended to use official APIs from established providers that offer authentication, usage limits, and clear terms of service.

[Request]
Method=GET
EncryptText=1
UserAgent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/145.0.0.0 Safari/537.36
EncodeText=1
Url=https://text.pollinations.ai/{prompt}
Accept=*/*

[Headers]
Connection=keep-alive

[Parameters]
EncodeCustomParameters=0

[Custom Parameters]
prompt=Translate from {source} language to {target} language. Return only the translated text. Preserve line breaks and word wrapping in the output. Add a period at the end only if it was present in the original text. If it is impossible to translate the text, simply return the original text.Text for translation: {text}

