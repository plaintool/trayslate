[Service]
Name=Papago Translate
Order=10
AutoSwapLanguage=1
ColorRecent=3178624
ValueType=Language


[Service Description]
0=Papago Translate — this configuration uses a web translation endpoint of Papago by NAVER to translate text between supported languages. It sends a POST request with source language, target language, and input text, and returns the translated result in JSON format. The service is used to perform machine translation in real time for user-provided text.
1=
2=Legal note: this endpoint is part of Papago’s web infrastructure and may be used in lightweight, user-driven applications such as a desktop translator. It does not require a separate API key for this type of request and can work as a practical integration for personal or low-frequency usage within a client application.
3=
4=For long-term stability, commercial use, or production systems, it is recommended to use the official NAVER Papago API, which provides documented access, authentication, and guaranteed service behavior:
5=
6=https://developers.naver.com/products/nmt
7=
8=The user is responsible for ensuring appropriate use according to the service provider’s terms and policies.

[Request]
Method=POST
UserAgent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/145.0.0.0 Safari/537.36
EncodeText=1
Url=https://papago.naver.com/apis/n2mt/translate
ContentType=application/x-www-form-urlencoded; charset=UTF-8
PostData=source={source}&target={target}&text={text}
Accept=application/json

[Headers]
Connection=Keep-Alive
Accept-Language=en-US
Referer=https://papago.naver.com/

[Response]
JsonPointer=/translatedText;/errorMessage

[Parameters]
EncodeCustomParameters=1

