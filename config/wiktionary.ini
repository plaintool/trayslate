[Service Description]
0=Wiktionary Definitions — this configuration uses the public API of Wiktionary, a free multilingual dictionary project operated by the Wikimedia Foundation, to retrieve word definitions in the selected language. It sends a request to the MediaWiki API and extracts plain text content from dictionary entries. The service supports many languages and is useful for quick access to meanings and basic lexical information.
1=
2=Legal note: the Wiktionary API is public and does not require an API key. Its use in low-frequency applications (such as a desktop translator where requests are triggered by user input) is generally allowed, provided that you follow the Wikimedia usage guidelines, including reasonable request rates and respectful use of their infrastructure. This configuration is intended for normal interactive use and does not perform heavy or automated querying.
3=
4=The user is responsible for complying with the Wikimedia Terms of Use and content licenses (e.g., Creative Commons). If you need higher reliability, large-scale usage, or commercial integration, you should review the official documentation and consider proper solutions or hosting your own services if needed:
5=
6=https://www.mediawiki.org/wiki/API:Main_page
7=https://foundation.wikimedia.org/wiki/Terms_of_Use

[Request]
Method=GET
UserAgent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/145.0.0.0 Safari/537.36
EncodeText=1
Url=https://{!source}.wiktionary.org/w/api.php?action=query&titles={!text}&prop=extracts&format=json&explaintext=1
Accept=application/json

[Headers]
Connection=keep-alive

[Response]
JsonPointer=/*{Keyword: }/query/pages/0/title{#10};*//query/pages/0/extract;{No Data}!/query/pages/0/extract

[Parameters]
EncodeCustomParameters=1

