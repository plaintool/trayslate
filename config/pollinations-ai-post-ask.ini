[Service]
Name=Pollinations AI - Post Ask
Order=7
AutoSwapLanguage=0
ColorRecent=3178624
ValueType=Language

RealTimeTranslation=0

[Service Description]
0=Pollinations AI – Post Ask — this configuration sends a POST request to the Pollinations AI text endpoint, providing access to AI language models through a simplified OpenAI-compatible API format. Instead of translation, this configuration applies predefined action patterns (such as answering questions, summarizing, rewriting, generating ideas, and more) to the provided text. The selected pattern defines how the AI processes the input. The response is returned in a structure similar to chat-based AI APIs.
1=
2=Legal note: Pollinations AI provides public endpoints for free access, mainly intended for testing, experimentation, and low-frequency personal use. These services are community-driven and do not guarantee stability, availability, or consistent behavior. For normal interactive use, this configuration is generally acceptable.
3=
4=There is no guarantee which exact model is used behind the service, and behavior may change without notice. High-volume, automated, or commercial usage may be restricted or unreliable.
5=
6=The user is responsible for how this configuration is used. If you need a stable, production-ready, or commercial solution, it is recommended to use official APIs from established providers that offer authentication, usage limits, and clear terms of service.

[Request]
Method=POST
EncryptText=1
UserAgent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/145.0.0.0 Safari/537.36
EncodeText=0
Url=https://text.pollinations.ai/openai
ContentType=application/json
PostData={\r\n    "model": "openai",\r\n    "messages": [\r\n      {"role": "system", "content": "{prompt}"},\r\n      {"role": "user", "content": "{data}"}\r\n    ],\r\n    "temperature": 0.5\r\n}
Accept=*/*

[Response]
JsonPointer=/choices/0/message/content;/error;!/choices/0/message/content{Failed to generate an answer as a result of reasoning}

[Headers]
Connection=keep-alive

[Parameters]
EncodeCustomParameters=0

[Custom Parameters]
prompt=Perform the user-requested action: "{source}". Return the answer in {target} language; if it is "auto", use the same language as the request. If the provided material does not match the requested action, respond to the user in their language: "It is not possible to perform {requested action} with the provided data." Just return the result—no explanations, reasoning, or extra comments. No code blocks, just plain text. Do not use formatting such as Markdown tables, etc.
data=Apply it to the provided material: {text}

