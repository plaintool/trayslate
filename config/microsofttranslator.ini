[Service]
AutoSwapLanguage=1
Order=5
Name=Microsoft Translator

[Request]
Method=POST
UserAgent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/145.0.0.0 Safari/537.36
EncryptText=1
Url=https://www.bing.com/ttranslatev3?isVertical=1&IG={IG}&IID=translator.5033
ContentType=application/x-www-form-urlencoded
PostData=text={text}&fromLang={source}&to={target}&token={token}&key={key}
Accept=application/json

[Response]
ParserType=Json
JsonPointer=/0/translations/0/text

[Headers]
