[Service]
Name=CoinConvert Crypto Converter
Order=14
AutoSwapLanguage=0
ColorRecent=8421504
ValueType=CurrencyAll


[Service Description]
0=CoinConvert Crypto Converter — this configuration uses a public HTTP endpoint of CoinConvert to convert values between cryptocurrencies and fiat currencies. It sends a GET request with the source asset, target asset, and amount, and returns a JSON response containing the converted result based on market rates.
1=
2=Legal note: this service provides a publicly accessible conversion endpoint without an officially published developer API or formal SDK. There is no documented licensing or official integration program for third-party applications. In practice, this type of endpoint is commonly used for lightweight, user-driven requests (such as a desktop converter triggered manually by the user) and is generally available for normal usage patterns.
3=
4=At the same time, because there is no official API agreement or published developer terms for integration, this configuration should be considered an example of a technical implementation rather than an officially supported integration method. The service may change or restrict access at any time without notice.
5=
6=The user is responsible for ensuring appropriate use in accordance with the service’s general terms and conditions of the website.

[Request]
Method=GET
UserAgent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/145.0.0.0 Safari/537.36
EncodeText=0
Url=https://api.coinconvert.net/convert/{source}/{target}?amount={text}
Accept=text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7

[Headers]
Connection=keep-alive
Accept-Encoding=gzip, deflate, br, zstd

[Response]
JsonPointer=/2;{Not Supported}!/2

[Parameters]
EncodeCustomParameters=1

