[Service]
Name=MarketsHost Currency Converter
Order=13
AutoSwapLanguage=0
ValueType=CurrencyFiat
ColorRecent=5263456

[Service Description]
0=MarketsHost Currency Converter — this configuration uses a public HTTP API provided by MarketsHost Currency API to convert fiat currencies. It sends a GET request with source currency, target currency, and amount, and returns the converted value in JSON format. The service is used to retrieve live or cached exchange rates and perform basic currency conversion.
1=
2=Legal note: this type of API is typically provided as a free public endpoint for lightweight usage or testing purposes. It can be used in low-frequency scenarios such as a desktop application where the user manually requests conversions. However, it is not a formally guaranteed financial data API and may have limitations in accuracy, rate limits, or availability.
3=
4=For production, financial, or commercial usage, it is recommended to use official exchange rate providers or licensed financial APIs that provide guaranteed accuracy and service reliability.
5=
6=The user is responsible for ensuring appropriate use according to the service provider’s terms and data usage conditions.

[Request]
Method=GET
UserAgent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/145.0.0.0 Safari/537.36
EncodeText=0
Url=https://www.marketshost.com/production/api/rates.php?from={source}&to={target}&amount={text}

[Headers]
Connection=keep-alive

[Response]
JsonPointer=/result/converted_amount;{Not Supported}!/result/converted_amount

[Parameters]
EncodeCustomParameters=1

