[Service]
Name=DeepL Translate
Order=8
AutoSwapLanguage=1
ColorRecent=14053594
ValueType=Language

[Service Description]
0=DeepL Translate — this configuration uses an unofficial web endpoint of DeepL Translator by DeepL SE to perform text translation between supported languages. It sends a structured JSON request similar to the one used internally by the DeepL web application and returns the translated text in JSON format.
1=
2=Legal note: this endpoint is part of DeepL’s web interface infrastructure and is not an officially published or supported public API. According to DeepL’s Terms of Service, automated access to the service via the web interface (including reverse-engineered or non-documented endpoints) is not considered an intended or authorized integration method. The only officially supported way to use DeepL programmatically is through the DeepL API.
3=
4=For this reason, this configuration should be considered an example of a technical implementation and is intended for informational and educational purposes. It is not an officially endorsed integration method.
5=
6=For compliant and production usage, it is recommended to use the official DeepL API, which provides documented access, authentication, and licensed usage terms:
7=
8=https://www.deepl.com/pro-api

[Request]
Method=POST
UserAgent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/145.0.0.0 Safari/537.36
EncodeText=0
Url=https://www2.deepl.com/jsonrpc?method=LMT_handle_texts
ContentType=application/json
PostData={\r\n  "jsonrpc": "2.0",\r\n  "method": "LMT_handle_texts",\r\n  "id": {rand},\r\n  "params": {\r\n    "texts": [\r\n      {\r\n        "text": "{text}",\r\n        "requestAlternatives": 1\r\n      }\r\n    ],\r\n    "splitting": "newlines",\r\n    "lang": {\r\n      "source_lang_user_selected": "{source}",\r\n      "target_lang": "{target}"\r\n    },\r\n    "timestamp": {timestamp},\r\n    "commonJobParams": {\r\n      "mode": "translate"\r\n    }\r\n  }\r\n}
Accept=application/json

[Headers]
Origin=https://www.deepl.com
Referer=https://www.deepl.com/
Accept-Encoding=gzip, deflate
Accept-Language=ru-RU,ru;q=0.9,en-US;q=0.8,en;q=0.7

[Response]
JsonPointer=/result/texts/0/text; /error/message; {{<h1[^>]*>(.*?)</h1>[*]}#10{<p[^>]*>(.*?)</p>[*#10]}}!/result/texts/0/text

[Parameters]
EncodeCustomParameters=1

