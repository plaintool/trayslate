[Request]
Method=POST
Url=https://api-free.deepl.com/v2/translate
PostData=auth_key=\r\n&text={text}\r\n&source_lang={source}\r\n&target_lang={target}
UserAgent=Mozilla/5.0
ContentType=application/json

[Response]
ParserType=Json
Regexp=(?:translatedText|error)"\s*:\s*"((?:[^"\\]|\\.)*)
JsonPointer=translations/text

[Service]
Name=DeepL

